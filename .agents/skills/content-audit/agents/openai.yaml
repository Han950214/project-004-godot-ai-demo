interface:
  display_name: "content-audit"
  short_description: "Audit GDD-specified content counts against implemented content. Identifies what's planned vs built. 当用户明确点名该流程或当前任务与其专业目标直接匹配时使用；不用于无关的一般开发任务。"
  default_prompt: "使用 $content-audit 完成当前明确范围内的工作。"

policy:
  allow_implicit_invocation: true
