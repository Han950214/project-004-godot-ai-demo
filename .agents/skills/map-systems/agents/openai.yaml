interface:
  display_name: "map-systems"
  short_description: "Decompose a game concept into individual systems, map dependencies, prioritize design order, and create the systems index. 当用户明确点名该流程或当前任务与其专业目标直接匹配时使用；不用于无关的一般开发任务。"
  default_prompt: "使用 $map-systems 完成当前明确范围内的工作。"

policy:
  allow_implicit_invocation: true
